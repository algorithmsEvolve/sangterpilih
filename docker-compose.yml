services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sangterpilih-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - sangterpilih_vendor:/var/www/vendor
      - sangterpilih_node_modules:/var/www/node_modules
    env_file:
      - .env
    ports:
      - "8003:8003"
    command: sh -c "composer install --no-interaction && php artisan serve --host=0.0.0.0 --port=8003"
    networks:
      - redis_default

  vite:
    image: node:20-alpine
    container_name: sangterpilih-vite
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - sangterpilih_node_modules:/var/www/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5173"
    networks:
      - redis_default

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sangterpilih-reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - sangterpilih_vendor:/var/www/vendor
    command: sh -c "php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    networks:
      - redis_default

volumes:
  sangterpilih_vendor:
  sangterpilih_node_modules:

networks:
  redis_default:
    external: true
